<h2>Generated Question Papers</h2>
<div class="view">
    <select (change)="filterBySubject(sub.value)" #sub>
  <option value="">All Subjects</option>
  @for(s of data.subjects(); track $index){
    <option value="{{s.name}}">{{s.name}}</option>
  }
</select>
<table>
  <thead>
    <tr>
      <th>Subject</th>
      <th>Units</th>
      <th>Difficulty</th>
      <th>Exam Type</th>
      <th>Date</th>
      <th>Action</th>
    </tr>
  </thead>

  <tbody>
    @for(p of papers(); track $index){
      <tr>
        <td>{{p.subject}}</td>
        <td>{{p.units.join(', ')}}</td>
        <td>{{p.difficulty}}</td>
        <td>{{p.examType}}</td>
        <td>{{p.createdAt | date:'short'}}</td>
        <td>
          <button (click)="download(p._id)">Download</button>
        </td>
      </tr>
    }
  </tbody>
</table>
</div>
